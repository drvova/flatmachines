spec: flatmachine
spec_version: 2.0.0
data:
  name: ipd-player
  context:
    role: input.role
    round: input.round
    rounds_total: input.rounds_total
    own_history: input.own_history
    opponent_history: input.opponent_history
    opponent_last_move: input.opponent_last_move
    decision_raw: null
    decision_attempts: 0
    max_decision_attempts: '{{ input.max_decision_attempts | default(3) }}'
  agents:
    decider: ./agent.yml
  states:
    start:
      type: initial
      transitions:
      - to: llm_decision
    llm_decision:
      agent: decider
      execution:
        type: retry
        retry_on_empty: true
        backoffs:
        - 1
        - 2
        - 4
      input:
        role: context.role
        round: context.round
        rounds_total: context.rounds_total
        own_history: context.own_history
        opponent_history: context.opponent_history
        opponent_last_move: context.opponent_last_move
      output_to_context:
        decision_raw: '{{ output.content }}'
        decision_attempts: '{{ (context.decision_attempts or 0) + 1 }}'
      transitions:
      - condition: context.decision_raw == 'cooperate'
        to: cooperate
      - condition: context.decision_raw == 'defect'
        to: defect
      - condition: context.decision_attempts < context.max_decision_attempts
        to: llm_decision
      - to: invalid_decision
    cooperate:
      type: final
      output:
        role: context.role
        round: context.round
        move: C
        move_label: cooperate
        decision_raw: context.decision_raw
    defect:
      type: final
      output:
        role: context.role
        round: context.round
        move: D
        move_label: defect
        decision_raw: context.decision_raw
    invalid_decision:
      type: final
      output:
        role: context.role
        round: context.round
        move: C
        move_label: cooperate
        decision_raw: context.decision_raw
