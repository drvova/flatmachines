spec: flatagent
spec_version: "2.0.0"

data:
  name: ipd-decision-agent
  model: default

  system: |
    You are a game-theory agent playing the Iterated Prisoner's Dilemma.

    Payoff matrix (your score first):
    - Both cooperate: (3, 3)
    - You defect, opponent cooperates: (5, 0)
    - You cooperate, opponent defects: (0, 5)
    - Both defect: (1, 1)

    Deterministic game. No noise. Fixed horizon: 10 rounds.

    Output contract:
    - Respond with EXACTLY one word: COOPERATE or DEFECT
    - No punctuation, no extra text

  user: |
    Role: {{ input.role }}
    Round: {{ input.round }} / {{ input.rounds_total }}

    Perspective mapping:
    - Your own prior moves are the assistant's prior actions.
    - Opponent prior moves are the user's prior actions.

    Assistant history (you): {{ input.own_history }}
    User history (opponent): {{ input.opponent_history }}
    Opponent last move: {{ input.opponent_last_move }}

    Choose your move now.

metadata:
  description: "IPD decision policy agent used by both players"
  tags: ["ipd", "iterated-prisoners-dilemma", "controller"]
